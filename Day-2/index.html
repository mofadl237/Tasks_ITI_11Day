<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day-2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #dbeafe, #e0f2fe, #f0f9ff);
            padding: 20px;
        }

        .converter-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 30px 25px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .converter-card h1 {
            font-size: 26px;
            color: #1e3a8a;
            margin-bottom: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            text-align: left;
            font-size: 15px;
            font-weight: bold;
            color: #334155;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        input[type="button"] {
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="button"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
        }

        .result-box {
            margin-top: 25px;
            padding: 18px;
            border-radius: 14px;
            background: #f8fafc;
            border: 2px dashed #93c5fd;
        }

        .result-box h2 {
            font-size: 18px;
            color: #1e40af;
            margin-bottom: 10px;
        }

        .result-box p {
            font-size: 22px;
            font-weight: bold;
            color: #0f172a;
            word-break: break-word;
        }

        @media (max-width: 500px) {
            .converter-card {
                padding: 25px 18px;
            }

            .converter-card h1 {
                font-size: 22px;
            }

            .result-box p {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="converter-card">
        <h1>Binary to Octal</h1>
        <form action="">
            <label for="binaryNumber">Enter Binary Number</label>
            <input type="text" id="binaryNumber" placeholder="10101010">
            <input type="button" value="Convert">
        </form>

        <div class="result-box">
            <h2>Converted Result</h2>
            <p id="result">---</p>
        </div>
    </div>

</body>
</html>
