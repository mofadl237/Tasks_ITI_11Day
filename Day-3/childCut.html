<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Cut</title>

    <style>
        
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            padding: 20px;
        }

        #animationHead {
            min-width: 320px;
            max-width: 800px;
            min-height: 120px;
            padding: 30px 35px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            text-align: center;
            font-size: 2rem;
            line-height: 1.8;
            letter-spacing: 1px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            position: relative;
            overflow: hidden;
            word-break: break-word;
        }

        #animationHead::after {
            content: "|";
            color: #38bdf8;
            margin-left: 6px;
            animation: blink 0.8s infinite;
            font-weight: bold;
        }

        @keyframes blink {
            0%, 50%, 100% {
                opacity: 1;
            }
            25%, 75% {
                opacity: 0;
            }
        }

    </style>
</head>
<body>
    <h1 id="animationHead">

    </h1>
   
    <script src="./task.js"></script>
</body>
</html>
